<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>El Concejo de Bancadas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --paper:#F2E9D8;
    --ink:#1C1B18;
    --cream:#FBF6EA;
    --teal:#2F6E75;
    --green:#3C6E4A;
    --gold:#D9A62E;
    --maroon:#8C2F26;
    --orange:#D9752B;
    --navy:#33465C;
    --olive:#5C6B2E;
    --line:#1C1B18;
    --danger:#B23A2E;
    --ok:#4C8C55;
    --font-display: 'Arial Black', Impact, 'Franklin Gothic Bold', 'Helvetica Neue', sans-serif;
    --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-mono: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; background:var(--paper); color:var(--ink); font-family:var(--font-ui); }
  h1,h2,h3{ font-family:var(--font-display); text-transform:uppercase; letter-spacing:.01em; margin:0 0 6px; }
  .muted{ color:#6b6455; }
  .center{ text-align:center; }
  a{ color:inherit; }

  /* --- entrada / formularios genéricos (mismo estilo cartel, ancho normal) --- */
  #app.entry-shell{ max-width:1000px; margin:0 auto; padding:24px 16px 60px; }
  .seal{
    width:88px; height:88px; border-radius:50%;
    background: radial-gradient(circle at 35% 30%, var(--gold), var(--maroon) 120%);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-mono); font-weight:700; letter-spacing:.06em;
    color:var(--cream); font-size:20px;
    box-shadow: 0 0 0 4px var(--cream), 0 0 0 7px var(--ink);
    margin:0 auto 10px;
  }
  .poster-card{ background:var(--cream); border:3px solid var(--ink); border-radius:16px; padding:18px 18px; margin-bottom:14px; box-shadow:5px 5px 0 var(--ink); }
  .poster-card.tight{ padding:12px 14px; }
  .grid{ display:grid; gap:14px; }
  @media(min-width:820px){ .grid.cols-2{ grid-template-columns:1fr 1fr; } }

  .btn{ font-family:var(--font-ui); font-weight:700; font-size:14px; border:3px solid var(--ink); border-radius:10px; padding:10px 16px; cursor:pointer; background:var(--cream); color:var(--ink); box-shadow:3px 3px 0 var(--ink); }
  .btn:active{ transform:translate(2px,2px); box-shadow:1px 1px 0 var(--ink); }
  .btn-primary{ background:var(--teal); color:var(--cream); }
  .btn-gold{ background:var(--gold); }
  .btn-red{ background:var(--maroon); color:var(--cream); }
  .btn-ghost{ background:var(--cream); }
  .btn-sm{ padding:6px 10px; font-size:12px; border-width:2px; box-shadow:2px 2px 0 var(--ink); border-radius:7px; }
  .btn:disabled{ opacity:.4; cursor:not-allowed; }
  .btn-row{ display:flex; gap:8px; flex-wrap:wrap; }

  input[type=text], input[type=number], select, textarea{
    font-family:var(--font-ui); font-size:14px; padding:9px 11px; border:2.5px solid var(--ink);
    border-radius:8px; background:#fff; color:var(--ink); width:100%;
  }
  label{ font-size:11px; font-weight:700; color:var(--ink); text-transform:uppercase; letter-spacing:.05em; display:block; margin-bottom:4px; }
  .field{ margin-bottom:10px; }

  .tag{ display:inline-block; font-family:var(--font-mono); font-size:10.5px; padding:2px 8px; border-radius:20px; background:var(--ink); color:var(--cream); margin:2px 4px 2px 0; }
  .tag.red{ background:var(--maroon); }
  .tag.ok{ background:var(--ok); }
  .tag.outline{ background:transparent; border:1.5px solid var(--ink); color:var(--ink); }

  .entry-choice{ display:grid; gap:14px; margin-top:22px; }
  @media(min-width:640px){ .entry-choice{ grid-template-columns:repeat(3,1fr); } }
  .choice-card{ background:var(--cream); border:3px solid var(--ink); border-radius:16px; padding:22px 16px; text-align:center; cursor:pointer; box-shadow:5px 5px 0 var(--ink); }
  .choice-card:hover{ transform:translate(-1px,-1px); box-shadow:6px 6px 0 var(--ink); }
  .footer-note{ text-align:center; font-size:11px; color:#6b6455; margin-top:26px; font-family:var(--font-mono); }
  .config-warn{ background:#FBEAE6; border:2.5px solid var(--maroon); border-radius:10px; padding:14px 16px; margin:20px auto; max-width:700px; font-size:13px; }

  .pdot{ display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; }
  .pdot.on{ background:var(--ok); }
  .pdot.off{ background:#bbb; }

  /* --- DASHBOARD (GM y video beam) --- */
  .dash-wrap{ height:100vh; display:flex; flex-direction:column; padding:10px 14px 12px; gap:8px; }
  .dash-banner{ text-align:center; flex:0 0 auto; }
  .dash-banner h1{ font-size:22px; margin:0; }
  .dash-banner .subline{ font-family:var(--font-mono); font-size:11px; }
  .dash-top{ display:flex; gap:10px; flex:0 0 auto; }
  .dash-top > div{ flex:1; min-width:0; }
  .dash-top .timer-box{ flex:1.3; }
  .dash-bottom{ display:flex; gap:10px; flex:1; min-height:0; }
  .dash-bottom .bancadas-col{ flex:1.15; min-width:0; overflow-y:auto; }
  .dash-bottom .side-col{ flex:1; min-width:0; display:flex; flex-direction:column; gap:8px; }
  .side-col .side-panel{ flex:1; min-height:0; overflow-y:auto; }
  .box{ background:var(--cream); border:3px solid var(--ink); border-radius:14px; padding:10px 12px; }
  .box h3{ font-size:13px; margin:0 0 6px; }
  .box-scroll{ overflow-y:auto; }

  .timer-box{ display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--ink); color:var(--cream); border-radius:16px; border:3px solid var(--ink); padding:8px; text-align:center; }
  .timer-digits{ font-family:var(--font-mono); font-weight:700; font-size:clamp(40px,7vw,74px); line-height:1; letter-spacing:.02em; }
  .timer-digits.grace{ color:var(--gold); }
  .timer-phase{ font-family:var(--font-display); font-size:clamp(13px,1.6vw,18px); margin-top:2px; }
  .timer-controls{ margin-top:8px; display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }

  .bancada-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .bancada-box{ border:3px solid var(--ink); border-radius:12px; padding:8px 9px; background:var(--cream); position:relative; }
  .bancada-box .num-badge{ position:absolute; top:-10px; left:-10px; width:26px; height:26px; border-radius:50%; color:var(--cream); font-family:var(--font-mono); font-weight:700; font-size:13px; display:flex; align-items:center; justify-content:center; border:2.5px solid var(--ink); }
  .bancada-box .head{ font-size:12.5px; font-weight:700; margin:2px 0 4px 10px; }
  .bancada-box .seats-row{ font-size:11px; letter-spacing:1px; }
  .bancada-box .members{ font-size:10.5px; margin:4px 0; }
  .bancada-box .scores-row{ display:flex; gap:6px; align-items:center; font-size:11px; margin-top:4px; }
  .bancada-box .pm{ display:inline-flex; align-items:center; gap:3px; }
  .bancada-box .pm button{ width:18px; height:18px; border-radius:5px; border:1.5px solid var(--ink); background:#fff; cursor:pointer; font-weight:700; font-size:11px; line-height:1; }
  .vote-status{ font-size:10px; font-weight:700; padding:1px 6px; border-radius:10px; }
  .vote-status.pend{ background:#eee; color:#555; }
  .vote-status.done{ background:var(--ok); color:#fff; }

  .denuncia-item{ border-left:3px solid var(--maroon); padding:6px 8px; margin-bottom:6px; background:#FBF0EC; border-radius:0 8px 8px 0; font-size:12px; }
  .log-item{ border-left:3px solid var(--ink); padding:6px 8px; margin-bottom:6px; background:#F4EEDE; border-radius:0 8px 8px 0; font-size:11.5px; }
  .log-item.aprobada{ border-left-color:var(--ok); }
  .log-item.rechazada{ border-left-color:var(--maroon); }

  table{ width:100%; border-collapse:collapse; font-size:12px; }
  th,td{ text-align:left; padding:5px 6px; border-bottom:1px solid #ddd3ba; }
  th{ font-family:var(--font-mono); font-size:10px; text-transform:uppercase; }

  /* --- Jugador móvil: una sola pantalla --- */
  .player-wrap{ min-height:100vh; max-height:100vh; overflow-y:auto; display:flex; flex-direction:column; padding:10px 12px; gap:8px; }
  .player-top{ display:flex; justify-content:space-between; align-items:center; font-family:var(--font-mono); font-size:11px; background:var(--ink); color:var(--cream); border-radius:10px; padding:6px 10px; flex-wrap:wrap; gap:4px; }
  .player-law{ font-size:13px; }
  .player-law h2{ font-size:16px; margin:0 0 2px; }
  .id-card{ border:3px solid var(--ink); border-radius:14px; padding:12px 14px; background:var(--cream); flex:1; min-height:0; overflow-y:auto; }
  .id-card h2{ font-size:16px; }
  .id-card p{ font-size:12.5px; margin:4px 0; }
  .vote-row{ display:flex; gap:6px; }
  .vote-btn{ flex:1; padding:12px 4px; border-radius:9px; border:3px solid var(--ink); background:#fff; font-weight:700; font-size:12.5px; cursor:pointer; }
  .vote-btn.selected-favor{ background:var(--teal); color:#fff; }
  .vote-btn.selected-contra{ background:var(--maroon); color:#fff; }
  .vote-btn.selected-condic{ background:var(--gold); }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function(){

  /* ======================================================================
     CONFIGURA AQUÍ TU PROYECTO DE SUPABASE (mismo valor que ya usabas)
     ====================================================================== */
  const SUPABASE_URL = "https://ogfizmsbletrsmmyfeiz.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nZml6bXNibGV0cnNtbXlmZWl6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5NzM0NjgsImV4cCI6MjA5OTU0OTQ2OH0.zwH5GQ4HBFotbG4-ecnK40sS4tewzlEg3vyp8dkonB4";

  const CONFIGURED = SUPABASE_URL.indexOf('http') === 0 && SUPABASE_ANON_KEY.length > 20;
  const sb = CONFIGURED ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

  const GRACE_MS = 30000;
  const DEFAULT_DURATIONS = { deliberacion:120, discursos:90, negociacion:240, votacion:90 };
  const PHASE_ORDER = ['deliberacion','discursos','negociacion','votacion'];
  const PHASE_LABELS = { lobby:'Esperando ley', deliberacion:'Deliberación interna', discursos:'Discursos públicos', negociacion:'Negociación abierta', votacion:'Votación' };

  const IDENTITIES = [
    { id:'verde', name:'Partido Verde-Comunitario', color:'#3C6E4A',
      base:'Zonas rurales y movimientos ambientalistas.',
      interes:'Protección ambiental y economía campesina.',
      lineasRojas:['Megaminería sin consulta previa','Privatización del agua'],
      flexibles:['Política fiscal','Alianzas puntuales de conveniencia'] },
    { id:'liberal', name:'Partido Liberal-Empresarial', color:'#D9A62E',
      base:'Sector urbano y gremios empresariales.',
      interes:'Libre mercado y baja regulación estatal.',
      lineasRojas:['Impuestos altos a empresas','Controles de precios'],
      flexibles:['Temas culturales e identitarios'] },
    { id:'tradicion', name:'Partido Tradición y Familia', color:'#8C2F26',
      base:'Sectores religiosos y conservadores.',
      interes:'Defensa de los valores familiares tradicionales.',
      lineasRojas:['Reconocimiento legal de identidades de género no binarias','Educación sexual laica obligatoria'],
      flexibles:['Política económica'] },
    { id:'obrero', name:'Partido Obrero-Popular', color:'#D9752B',
      base:'Sindicatos y trabajadores formales e informales.',
      interes:'Derechos laborales y redistribución.',
      lineasRojas:['Privatización de empresas públicas','Flexibilización laboral que reduzca prestaciones'],
      flexibles:['Temas ambientales'] },
    { id:'outsider', name:'Movimiento Outsider', color:'#33465C',
      base:'Votantes desencantados con los partidos tradicionales.',
      interes:'Anticorrupción y "cambio" frente a la clase política.',
      lineasRojas:[],
      flexibles:['Todo. Su identidad es la ambigüedad calculada'] },
    { id:'etnico', name:'Movimiento Étnico-Regional', color:'#5C6B2E',
      base:'Comunidades indígenas, afrodescendientes y regiones periféricas.',
      interes:'Autonomía territorial y representación cultural.',
      lineasRojas:['Reducción de la consulta previa','Recorte de la autonomía territorial'],
      flexibles:['Política económica general'] }
  ];

  const LAWS = [
    { id:'tributaria', title:'Reforma Tributaria Progresiva', desc:'Aumenta impuestos a las grandes empresas y a las rentas altas.', beneficia:['obrero'], choca:['liberal'] },
    { id:'consulta', title:'Ley de Consulta Previa Minera', desc:'Exige consulta previa obligatoria y vinculante para proyectos mineros.', beneficia:['verde','etnico'], choca:['liberal'] },
    { id:'flexlaboral', title:'Ley de Flexibilización Laboral', desc:'Reduce prestaciones laborales bajo el argumento de generar más empleo.', beneficia:['liberal'], choca:['obrero'] },
    { id:'generonobinario', title:'Reconocimiento Legal de Identidades de Género No Binarias', desc:'Otorga reconocimiento legal pleno a identidades de género no binarias.', beneficia:[], choca:['tradicion'] },
    { id:'redes', title:'Regulación de Redes Sociales y Desinformación Electoral', desc:'Crea reglas para plataformas digitales durante campañas electorales.', beneficia:[], choca:[] },
    { id:'salariominimo', title:'Aumento del Salario Mínimo por Decreto', desc:'Incrementa el salario mínimo legal por encima de la inflación.', beneficia:['obrero'], choca:['liberal'] },
    { id:'religion', title:'Educación Religiosa Obligatoria en Colegios Públicos', desc:'Incluye educación religiosa obligatoria en el currículo público.', beneficia:['tradicion'], choca:[] },
    { id:'reformaelectoral', title:'Reforma Electoral: Listas Cerradas y Paridad de Género', desc:'Cambia el sistema electoral hacia listas cerradas con paridad.', beneficia:[], choca:[] },
    { id:'privatizacion', title:'Privatización de Empresa Pública de Servicios', desc:'Vende a privados una empresa estatal de servicios públicos.', beneficia:['liberal'], choca:['obrero'] },
    { id:'autonomia', title:'Autonomía Territorial para Cabildos y Consejos Comunitarios', desc:'Amplía la autonomía de gobiernos indígenas y consejos comunitarios.', beneficia:['etnico','verde'], choca:[] }
  ];

  function uid(p){ return p+'_'+Math.random().toString(36).slice(2,9); }
  function genCode(){ const L='ABCDEFGHJKLMNPQRSTUVWXYZ'; let s=''; for(let i=0;i<4;i++) s+=L[Math.floor(Math.random()*L.length)]; return s; }
  function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
  function esc(s){ return (s===undefined||s===null) ? '' : String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function findIdentity(id){ return IDENTITIES.find(i=>i.id===id); }
  function findLaw(id){ return LAWS.find(l=>l.id===id); }
  function fmtClock(ms){ if(ms<0) ms=0; const s=Math.ceil(ms/1000); const m=Math.floor(s/60); const sec=s%60; return (m<10?'0':'')+m+':'+(sec<10?'0':'')+sec; }
  function renderDots(n){ const cap=10; const shown=Math.min(n,cap); let s=''; for(let i=0;i<shown;i++) s+='●'; if(n>cap) s+=' +'+(n-cap); return s; }
  function isOnline(p){ return !!(p && p.lastSeen && (Date.now()-p.lastSeen < 25000)); }

  /* ---------------------------- CAPA DE DATOS: SUPABASE ---------------------------- */

  let lastSyncOk = false;
  async function storageGet(code){
    if(!sb) return null;
    try{
      const { data, error } = await sb.from('lobbies').select('state').eq('code', code).maybeSingle();
      lastSyncOk = !error; if(error || !data) return null; return data.state;
    }catch(e){ lastSyncOk=false; return null; }
  }
  async function storageSet(code, state){
    if(!sb) return false;
    try{
      const { error } = await sb.from('lobbies').upsert({ code, state, updated_at: new Date().toISOString() });
      lastSyncOk = !error; return !error;
    }catch(e){ lastSyncOk=false; return false; }
  }
  let realtimeChannel = null;
  function subscribeRealtime(code){
    if(!sb) return;
    if(realtimeChannel){ sb.removeChannel(realtimeChannel); realtimeChannel=null; }
    realtimeChannel = sb.channel('lobby-changes-'+code)
      .on('postgres_changes', { event:'*', schema:'public', table:'lobbies', filter:'code=eq.'+code }, payload=>{
        if(payload.new && payload.new.state){ currentState = payload.new.state; lastSyncOk=true; renderApp(); }
      }).subscribe();
  }
  function unsubscribeRealtime(){ if(realtimeChannel && sb){ sb.removeChannel(realtimeChannel); realtimeChannel=null; } }

  function newLobbyState(code){
    return {
      code, createdAt: Date.now(), phaseGame:'waiting',
      players:[], bancadas:[], veedorIds:[],
      phaseDurations: Object.assign({}, DEFAULT_DURATIONS),
      lawDeckOrder: shuffle(LAWS.map(l=>l.id)), drawnLawIds:[], currentLawId:null,
      round:0, phase:'lobby', timerEndsAt:null,
      denuncias:[], log:[]
    };
  }

  /* ---------------------------- SESIÓN ---------------------------- */

  function saveSession(){ try{ localStorage.setItem('concejo_session_v2', JSON.stringify(session)); }catch(e){} }
  function loadSession(){ try{ const raw = localStorage.getItem('concejo_session_v2'); return raw?JSON.parse(raw):null; }catch(e){ return null; } }
  function clearSession(){ try{ localStorage.removeItem('concejo_session_v2'); }catch(e){} }

  function exitToEntry(){
    unsubscribeRealtime();
    if(pollHandle){ clearInterval(pollHandle); pollHandle=null; }
    if(heartbeatHandle){ clearInterval(heartbeatHandle); heartbeatHandle=null; }
    if(autoAdvanceHandle){ clearInterval(autoAdvanceHandle); autoAdvanceHandle=null; }
    clearSession();
    session = { role:null, lobbyCode:null, playerId:null, playerName:null };
    currentState = null; renderApp();
  }

  let session = { role:null, lobbyCode:null, playerId:null, playerName:null };
  let currentState = null;
  let pollHandle = null, heartbeatHandle = null, autoAdvanceHandle = null;
  let draft = { bancadaCount:5, veedorCount:2, denunciaNota:'' };
  let busy = false;

  function startPolling(){
    if(pollHandle) return;
    pollHandle = setInterval(async ()=>{ if(session.lobbyCode){ const s = await storageGet(session.lobbyCode); if(s){ currentState=s; renderApp(); } } }, 6000);
  }
  function startHeartbeat(){
    if(heartbeatHandle) return;
    heartbeatHandle = setInterval(async ()=>{
      if(session.role==='player' && session.lobbyCode && session.playerId){
        try{
          let s = await storageGet(session.lobbyCode);
          if(s){ const p=s.players.find(x=>x.id===session.playerId); if(p){ p.lastSeen=Date.now(); await storageSet(session.lobbyCode, s); } }
        }catch(e){}
      }
    }, 12000);
  }
  function startAutoAdvanceEngine(){
    if(autoAdvanceHandle) return;
    autoAdvanceHandle = setInterval(()=>{
      if(session.role!=='gm' || !currentState) return;
      if(!currentState.currentLawId || !currentState.timerEndsAt) return;
      if(Date.now() > currentState.timerEndsAt + GRACE_MS){
        mutate(s=>{
          if(!s.currentLawId || !s.timerEndsAt) return;
          if(Date.now() <= s.timerEndsAt + GRACE_MS) return;
          stepStateMachine(s);
        });
      }
    }, 1000);
  }

  async function mutate(fn){
    if(!session.lobbyCode || busy) return;
    busy = true;
    try{
      let s = await storageGet(session.lobbyCode);
      if(!s) s = currentState;
      fn(s);
      await storageSet(session.lobbyCode, s);
      currentState = s; renderApp();
    } finally { busy = false; }
  }

  /* ---------------------------- MOTOR DE FASES ---------------------------- */

  function stepStateMachine(s){
    const idx = PHASE_ORDER.indexOf(s.phase);
    if(idx>=0 && idx<PHASE_ORDER.length-1){
      const next = PHASE_ORDER[idx+1];
      s.phase = next;
      s.timerEndsAt = Date.now() + (s.phaseDurations[next]||90)*1000;
    } else if(s.phase==='votacion'){
      const total = s.bancadas.reduce((a,b)=>a+b.seats,0);
      const favor = s.bancadas.filter(b=>b.currentVote==='apoyo').reduce((a,b)=>a+b.seats,0);
      const needed = Math.floor(total/2)+1;
      resolveLaw(s, favor>=needed ? 'aprobada' : 'rechazada');
    }
  }

  function resolveLaw(s, result){
    const law = findLaw(s.currentLawId);
    const snapshot = s.bancadas.map(b=>({name:b.name, vote:b.currentVote, seats:b.seats}));
    const deltas = [];
    const passed = result==='aprobada';
    s.bancadas.forEach(b=>{
      const isBenef = law.beneficia.includes(b.identityId);
      const isClash = law.choca.includes(b.identityId);
      let dLeg=0, dConf=0;
      if(passed){
        if(b.currentVote==='apoyo'){
          if(isBenef) dLeg=3; else if(isClash){ dLeg=1; dConf=-2; } else dLeg=1;
        } else if(b.currentVote==='rechazo'){
          if(isClash) dConf=1;
        }
      } else {
        if(b.currentVote==='rechazo'){
          if(isClash){ dLeg=2; dConf=1; } else dLeg=1;
        }
      }
      b.legislativos += dLeg; b.confianza += dConf;
      if(dLeg!==0 || dConf!==0) deltas.push({name:b.name, dLeg, dConf});
    });
    s.log.unshift({ id:uid('log'), round:s.round, lawTitle:law.title, result, ts:Date.now(), snapshot, deltas });
    s.currentLawId=null; s.phase='lobby'; s.timerEndsAt=null;
    s.bancadas.forEach(b=>{ b.currentVote=null; b.voteBy=null; });
  }

  function computeTimerInfo(state){
    if(!state.timerEndsAt) return null;
    const now = Date.now();
    const main = state.timerEndsAt - now;
    if(main>0) return { mode:'main', ms:main };
    const grace = state.timerEndsAt + GRACE_MS - now;
    if(grace>0) return { mode:'grace', ms:grace };
    return { mode:'expired', ms:0 };
  }

  /* ---------------------------- RENDER RAÍZ ---------------------------- */

  function renderApp(){
    const app = document.getElementById('app');
    app.className = '';

    if(!CONFIGURED){
      app.className = 'entry-shell';
      app.innerHTML = `<div class="config-warn"><b>Falta configurar Supabase.</b> Reemplaza SUPABASE_URL y SUPABASE_ANON_KEY al inicio del &lt;script&gt; con los datos de tu proyecto.</div>`;
      return;
    }

    if(!session.role){ app.className='entry-shell'; app.innerHTML = tplEntry(); bindEntry(); return; }

    if(session.role==='gm'){
      if(!session.lobbyCode){ app.className='entry-shell'; app.innerHTML = tplGmEntry(); bindGmEntry(); return; }
      if(!currentState){ app.className='entry-shell'; app.innerHTML = tplLoading(); return; }
      if(currentState.phaseGame==='waiting'){ app.className='entry-shell'; app.innerHTML = tplGmWaiting(currentState); bindGmWaiting(); return; }
      startAutoAdvanceEngine();
      app.innerHTML = tplDashboard(currentState, true); bindDashboard(currentState, true); return;
    }

    if(session.role==='beamer'){
      if(!session.lobbyCode){ app.className='entry-shell'; app.innerHTML = tplBeamerEntry(); bindBeamerEntry(); return; }
      if(!currentState){ app.className='entry-shell'; app.innerHTML = tplLoading(); return; }
      if(currentState.phaseGame==='waiting'){
        app.className='entry-shell';
        app.innerHTML = `<div class="center" style="padding-top:60px;"><div class="seal">${esc(currentState.code)}</div><h2>Esperando a que el profesor asigne los roles...</h2></div>`;
        return;
      }
      app.innerHTML = tplDashboard(currentState, false); bindDashboard(currentState, false); return;
    }

    if(session.role==='player'){
      if(!session.lobbyCode){ app.className='entry-shell'; app.innerHTML = tplPlayerEntry(); bindPlayerEntry(); return; }
      if(!currentState){ app.className='entry-shell'; app.innerHTML = tplLoading(); return; }
      const me = currentState.players.find(p=>p.id===session.playerId);
      if(!me || !me.role){ app.className='entry-shell'; app.innerHTML = tplPlayerWaiting(currentState); return; }
      app.innerHTML = tplPlayerGame(currentState, me); bindPlayerGame(currentState, me); return;
    }
  }

  function bindGmWaiting(){
    const b=document.getElementById('cfg-bancadas'); if(b) b.oninput=e=>draft.bancadaCount=parseInt(e.target.value)||5;
    const v=document.getElementById('cfg-veedores'); if(v) v.oninput=e=>draft.veedorCount=parseInt(e.target.value)||0;
    document.getElementById('gm-assign').onclick = ()=>doAssign();

  async function doAssign(){
    const durations = {
      deliberacion: parseInt(document.getElementById('dur-deliberacion').value)||120,
      discursos: parseInt(document.getElementById('dur-discursos').value)||90,
      negociacion: parseInt(document.getElementById('dur-negociacion').value)||240,
      votacion: parseInt(document.getElementById('dur-votacion').value)||90
    };
    await mutate(s=>{
      const bCount = Math.max(3, Math.min(6, draft.bancadaCount||5));
      const vCount = Math.max(0, Math.min(5, draft.veedorCount||0));
      const totalNeeded = bCount + vCount;
      if(s.players.length < totalNeeded){ alert('Necesitas al menos '+totalNeeded+' estudiantes conectados para esta configuración.'); return; }

      const shuffled = shuffle(s.players.map(p=>p.id));
      const veedorIds = shuffled.slice(0, vCount);
      const remaining = shuffled.slice(vCount);
      const identitiesPool = shuffle(IDENTITIES.map(i=>i.id)).slice(0, bCount);

      const bancadas = identitiesPool.map((identId, idx)=>({
        id: uid('banc'), number: idx+1, identityId: identId, name: findIdentity(identId).name,
        seats: 0, memberIds: [], legislativos:0, confianza:0, currentVote:null, voteBy:null
      }));
      remaining.forEach((pid, idx)=>{ bancadas[idx % bancadas.length].memberIds.push(pid); });
      bancadas.forEach(b=>{ b.seats = Math.max(1, b.memberIds.length); });

      s.players.forEach(p=>{
        if(veedorIds.includes(p.id)){ p.role='veedor'; p.bancadaId=null; }
        else{ const banc = bancadas.find(b=>b.memberIds.includes(p.id)); p.role='bancada'; p.bancadaId = banc?banc.id:null; }
      });

      s.bancadas = bancadas; s.veedorIds = veedorIds;
      s.phaseDurations = durations;
      s.phaseGame = 'playing'; s.phase = 'lobby';
    });
  }

  /* ---------------------------- DASHBOARD (GM + BEAMER) ---------------------------- */

  function tplDashboard(state, isGM){
    const law = state.currentLawId ? findLaw(state.currentLawId) : null;
    const phaseLabel = PHASE_LABELS[state.phase] || state.phase;
    const timerInfo = computeTimerInfo(state);

    // --- caja info de partida ---
    const votadas = state.bancadas.filter(b=>b.currentVote).length;
    const infoBox = `
      <div class="box" style="height:100%;">
        <h3>Sala ${esc(state.code)}</h3>
        <p style="font-size:12px; margin:2px 0;">Ronda: <b>${state.round}</b> · Fase: <b>${esc(phaseLabel)}</b></p>
        <p style="font-size:12px; margin:2px 0;">Bancadas: <b>${state.bancadas.length}</b> · Veedores: <b>${state.veedorIds.length}</b></p>
        ${state.phase==='votacion' ? `<p style="font-size:12px; margin:2px 0;">Han votado: <b>${votadas}/${state.bancadas.length}</b></p>` : ''}
        <p style="font-size:11px;" class="muted">${lastSyncOk?'● en vivo':'● reconectando'}</p>
      </div>`;

    // --- caja cronómetro ---
    let timerDigits = '--:--';
    let graceClass = '';
    let timerSub = 'Sin ley activa';
    if(law && timerInfo){
      timerSub = phaseLabel;
      if(timerInfo.mode==='main'){ timerDigits = fmtClock(timerInfo.ms); }
      else if(timerInfo.mode==='grace'){ timerDigits = '+' + fmtClock(timerInfo.ms); graceClass='grace'; timerSub = phaseLabel + ' · tiempo de gracia'; }
      else { timerDigits = '00:00'; graceClass='grace'; timerSub = 'Avanzando...'; }
    }
    const gmTimerControls = isGM && law ? `
      <div class="timer-controls">
        <button class="btn btn-sm btn-gold" id="btn-skip">Adelantar fase →</button>
      </div>` : '';
    const timerBox = `
      <div class="timer-box">
        <div class="timer-digits ${graceClass}">${timerDigits}</div>
        <div class="timer-phase">${esc(timerSub)}</div>
        ${gmTimerControls}
      </div>`;

    // --- caja ley ---
    const drawControl = isGM && !law
      ? (state.lawDeckOrder.length>0
          ? `<button class="btn btn-primary btn-sm" id="btn-draw">Robar ley (${state.lawDeckOrder.length} restantes)</button>`
          : `<p class="muted" style="font-size:12px;">No quedan leyes en el mazo.</p>`)
      : '';
    const resolveControls = isGM && law && state.phase==='votacion'
      ? `<div class="btn-row" style="margin-top:6px;"><button class="btn btn-sm btn-gold" id="btn-approve">Aprobar ya</button><button class="btn btn-sm btn-red" id="btn-reject">Rechazar ya</button></div>`
      : '';
    let tallyLine = '';
    if(state.phase==='votacion'){
      const total = state.bancadas.reduce((a,b)=>a+b.seats,0);
      const favor = state.bancadas.filter(b=>b.currentVote==='apoyo').reduce((a,b)=>a+b.seats,0);
      const needed = Math.floor(total/2)+1;
      tallyLine = `<p style="font-size:12px; margin-top:6px;"><b>${favor}/${total}</b> escaños a favor (necesita ${needed}) ${favor>=needed?'<span class="tag ok">MAYORÍA</span>':''}</p>`;
    }
    const lawBox = `
      <div class="box" style="height:100%;">
        <h3>Proyecto de ley</h3>
        ${law ? `<p style="font-size:13px; font-weight:700; margin:2px 0;">${esc(law.title)}</p><p style="font-size:11.5px; margin:2px 0;">${esc(law.desc)}</p>
          <p style="font-size:11px;" class="muted">${law.beneficia.length?('Beneficia: '+law.beneficia.map(id=>esc(findIdentity(id).name)).join(', ')):''} ${law.choca.length?('· Choca con: '+law.choca.map(id=>esc(findIdentity(id).name)).join(', ')):''}</p>
          ${tallyLine}${resolveControls}`
          : '<p class="muted" style="font-size:12px;">Sin ley activa.</p>'}
        ${drawControl}
      </div>`;

    // --- columna bancadas ---
    const bancadasHtml = state.bancadas.map(b=>{
      const ident = findIdentity(b.identityId);
      const members = b.memberIds.map(pid=>{
        const p = state.players.find(x=>x.id===pid);
        return p ? `<span class="pdot ${isOnline(p)?'on':'off'}"></span>${esc(p.name)}` : '?';
      }).join(', ') || '<span class="muted">sin miembros</span>';
      const voted = !!b.currentVote;
      const voteBadge = state.phase==='votacion'
        ? (voted ? `<span class="vote-status done">${esc(b.currentVote.toUpperCase())}</span>` : `<span class="vote-status pend">PENDIENTE</span>`)
        : '';
      const scoreControls = isGM ? `
        <div class="scores-row">
          <span class="pm">L:<button data-banc="${b.id}" data-field="legislativos" data-delta="-1">−</button><b>${b.legislativos}</b><button data-banc="${b.id}" data-field="legislativos" data-delta="1">+</button></span>
          <span class="pm">C:<button data-banc="${b.id}" data-field="confianza" data-delta="-1">−</button><b>${b.confianza}</b><button data-banc="${b.id}" data-field="confianza" data-delta="1">+</button></span>
        </div>` : `<div class="scores-row"><b>Legisl: ${b.legislativos}</b> · <b>Confianza: ${b.confianza}</b></div>`;
      return `
        <div class="bancada-box" style="border-color:${ident.color};">
          <div class="num-badge" style="background:${ident.color};">${b.number}</div>
          <div class="head">${esc(b.name)} ${voteBadge}</div>
          <div class="seats-row">${renderDots(b.seats)} <span class="muted">${b.seats} escaños</span></div>
          <div class="members">${members}</div>
          ${scoreControls}
        </div>`;
    }).join('');

    // --- denuncias ---
    const denunciasHtml = state.denuncias.filter(d=>!d.resolved).map(d=>{
      const banc = state.bancadas.find(b=>b.id===d.bancadaId);
      return `<div class="denuncia-item">
        <b>${esc(d.veedorName)}</b> → <b>${banc?esc(banc.name):'?'}</b>: "${esc(d.note)}"
        ${isGM ? `<div class="btn-row" style="margin-top:4px;"><button class="btn btn-sm btn-red" data-denuncia="${d.id}" data-action="apply">−2 confianza</button><button class="btn btn-sm btn-ghost" data-denuncia="${d.id}" data-action="dismiss">Descartar</button></div>` : ''}
      </div>`;
    }).join('') || '<p class="muted" style="font-size:12px;">Sin denuncias pendientes.</p>';

    // --- puntajes ---
    const scoreRows = state.bancadas.slice().sort((a,b)=>(b.legislativos+b.confianza)-(a.legislativos+a.confianza))
      .map(b=>`<tr><td>${esc(b.name)}</td><td>${b.legislativos}</td><td>${b.confianza}</td><td><b>${b.legislativos+b.confianza}</b></td></tr>`).join('');

    // --- leyes de la partida ---
    const logHtml = state.log.map(entry=>{
      const deltasTxt = entry.deltas.map(d=>`${esc(d.name)} (${d.dLeg>=0?'+':''}${d.dLeg}L${d.dConf!==0?(', '+(d.dConf>=0?'+':'')+d.dConf+'C'):''})`).join('; ');
      return `<div class="log-item ${entry.result}">
        <b>${esc(entry.lawTitle)}</b> — ${entry.result==='aprobada'?'✅ Aprobada':'❌ Rechazada'} (ronda ${entry.round})
        <div class="muted" style="font-size:10.5px; margin-top:2px;">${deltasTxt||'Sin cambios de puntaje'}</div>
      </div>`;
    }).join('') || '<p class="muted" style="font-size:12px;">Aún no se ha resuelto ninguna ley.</p>';

    return `
      <div class="dash-wrap">
        <div class="dash-banner">
          <h1>El Concejo de Bancadas</h1>
          <div class="subline muted">${isGM ? 'Panel del profesor' : 'Tablero público'} · Sala ${esc(state.code)}</div>
        </div>
        <div class="dash-top">
          <div>${infoBox}</div>
          <div class="timer-box-wrap">${timerBox}</div>
          <div>${lawBox}</div>
        </div>
        <div class="dash-bottom">
          <div class="bancadas-col">
            <div class="bancada-grid">${bancadasHtml}</div>
          </div>
          <div class="side-col">
            <div class="box side-panel"><h3>Denuncias de veedores</h3>${denunciasHtml}</div>
            <div class="box side-panel"><h3>Marcador general</h3><table><thead><tr><th>Bancada</th><th>Leg.</th><th>Conf.</th><th>Total</th></tr></thead><tbody>${scoreRows}</tbody></table></div>
            <div class="box side-panel"><h3>Leyes de esta partida</h3>${logHtml}</div>
          </div>
        </div>
        ${isGM ? '<div class="center"><button class="btn btn-ghost btn-sm" id="back-entry3">← Salir</button></div>' : ''}
      </div>
    `;
  }

  function bindDashboard(state, isGM){
    if(!isGM) return; // el video beam es de solo lectura

    const drawBtn = document.getElementById('btn-draw');
    if(drawBtn) drawBtn.onclick = ()=>mutate(s=>{
      const nextId = s.lawDeckOrder.shift();
      s.currentLawId = nextId; s.drawnLawIds.push(nextId); s.round += 1;
      s.phase = 'deliberacion'; s.timerEndsAt = Date.now() + (s.phaseDurations.deliberacion||120)*1000;
      s.bancadas.forEach(b=>{ b.currentVote=null; b.voteBy=null; });
    });

    const skipBtn = document.getElementById('btn-skip');
    if(skipBtn) skipBtn.onclick = ()=>mutate(s=>{ stepStateMachine(s); });

    const approveBtn = document.getElementById('btn-approve');
    if(approveBtn) approveBtn.onclick = ()=>mutate(s=>resolveLaw(s,'aprobada'));
    const rejectBtn = document.getElementById('btn-reject');
    if(rejectBtn) rejectBtn.onclick = ()=>mutate(s=>resolveLaw(s,'rechazada'));

    document.querySelectorAll('[data-banc]').forEach(btn=>{
      btn.onclick = ()=>{
        const bancId=btn.getAttribute('data-banc'), field=btn.getAttribute('data-field'), delta=parseInt(btn.getAttribute('data-delta'));
        mutate(s=>{ const b=s.bancadas.find(x=>x.id===bancId); if(b) b[field]=(b[field]||0)+delta; });
      };
    });
    document.querySelectorAll('[data-denuncia]').forEach(btn=>{
      btn.onclick = ()=>{
        const id=btn.getAttribute('data-denuncia'), action=btn.getAttribute('data-action');
        mutate(s=>{
          const d=s.denuncias.find(x=>x.id===id); if(!d) return;
          d.resolved=true;
          if(action==='apply'){ const b=s.bancadas.find(x=>x.id===d.bancadaId); if(b) b.confianza-=2; }
        });
      };
    });

    const back = document.getElementById('back-entry3');
    if(back) back.onclick = exitToEntry;
  }

  function bindPlayerEntry(){

      if(!code || !name){ alert('Escribe el código y tu nombre.'); return; }

      if(!s){ alert('No existe una sala con ese código.'); return; }
      let existing = s.players.find(p=>p.name.toLowerCase()===name.toLowerCase());

        existing = { id: uid('pl'), name, role:null, bancadaId:null, lastSeen: Date.now() };
        s.players.push(existing); await storageSet(code, s);
      } else { existing.lastSeen = Date.now(); await storageSet(code, s); }
      session = { role:'player', lobbyCode:code, playerId:existing.id, playerName:name };
      currentState = s; saveSession(); subscribeRealtime(code); startPolling(); startHeartbeat(); renderApp();
    };
    document.getElementById('back-entry4').onclick = ()=>{ session={role:null,lobbyCode:null,playerId:null,playerName:null}; renderApp(); };
  }

  function tplPlayerWaiting(state){
    return `<div class="center" style="padding-top:60px;"><div class="seal">${esc(state.code)}</div><h2>Estás dentro, ${esc(session.playerName)}</h2><p class="muted">Esperando a que el profesor asigne los roles...</p></div>`;
  }

  /* ---------------------------- ESTUDIANTE: JUEGO (una sola pantalla) ---------------------------- */

  function tplPlayerGame(state, me){
    const law = state.currentLawId ? findLaw(state.currentLawId) : null;
    const phaseLabel = PHASE_LABELS[state.phase] || state.phase;
    const timerInfo = computeTimerInfo(state);
    let timerTxt = '';
    if(law && timerInfo){
      timerTxt = timerInfo.mode==='main' ? fmtClock(timerInfo.ms) : (timerInfo.mode==='grace' ? '+'+fmtClock(timerInfo.ms) : '00:00');
    }

    let roleBlock = '';
    if(me.role==='veedor'){
      const bancOptions = state.bancadas.map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join('');
      roleBlock = `
        <div class="id-card">
          <h2>Veedor Ciudadano</h2>
          <p>Compara lo que cada bancada dice con lo que vota. Marca contradicciones no justificadas.</p>
          <p style="font-size:11.5px;"><b>Bancadas:</b> ${state.bancadas.map(b=>esc(b.name)).join(' · ')}</p>
          <div class="field"><label>Bancada</label><select id="den-bancada">${bancOptions}</select></div>
          <div class="field"><label>¿Qué notaste?</label><textarea id="den-nota" rows="2"></textarea></div>
          <button class="btn btn-red btn-sm" id="den-submit">Marcar contradicción</button>
        </div>`;
    } else {
      const banc = state.bancadas.find(b=>b.id===me.bancadaId);
      const ident = banc ? findIdentity(banc.identityId) : null;
      let voteBlock = '';
      if(banc){
        if(state.phase==='votacion'){
          voteBlock = `<div class="vote-row" style="margin-top:6px;">
            <button class="vote-btn ${banc.currentVote==='apoyo'?'selected-favor':''}" data-vote="apoyo">Apoyo</button>
            <button class="vote-btn ${banc.currentVote==='rechazo'?'selected-contra':''}" data-vote="rechazo">Rechazo</button>
            <button class="vote-btn ${banc.currentVote==='condicionado'?'selected-condic':''}" data-vote="condicionado">Cond.</button>
          </div>`;
        } else {
          voteBlock = `<p class="muted" style="font-size:11.5px;">El voto se habilita en Votación.</p>`;
        }
      }
      roleBlock = banc ? `
        <div class="id-card">
          <h2 style="color:${ident.color};">${esc(ident.name)}</h2>
          <p><b>Base:</b> ${esc(ident.base)}</p>
          <p><b>Interés núcleo:</b> ${esc(ident.interes)}</p>
          <p><b>Líneas rojas:</b> ${ident.lineasRojas.length ? ident.lineasRojas.map(l=>`<span class="tag red">${esc(l)}</span>`).join('') : '<span class="muted">ninguna</span>'}</p>
          <p><b>Flexible:</b> ${ident.flexibles.map(f=>`<span class="tag outline">${esc(f)}</span>`).join('')}</p>
          ${voteBlock}
          <p style="font-size:11.5px; margin-top:6px;"><b>Puntaje:</b> Legisl. ${banc.legislativos} · Confianza ${banc.confianza}</p>
        </div>` : '<p class="muted">Aún no tienes bancada.</p>';
    }

    return `
      <div class="player-wrap">
        <div class="player-top">
          <span>Sala ${esc(state.code)}</span><span>Ronda ${state.round}</span><span>${esc(phaseLabel)}</span>${timerTxt?('<span>⏱ '+timerTxt+'</span>'):''}
        </div>
        <div class="player-law">${law ? `<h2>${esc(law.title)}</h2><p>${esc(law.desc)}</p>` : '<h2>Esperando la próxima ley...</h2>'}</div>
        ${roleBlock}
        <button class="btn btn-ghost btn-sm" id="back-entry5" style="align-self:center;">Salir</button>
      </div>
    `;
  }

  function bindPlayerGame(state, me){
    document.querySelectorAll('[data-vote]').forEach(btn=>{
      btn.onclick = ()=>{
        const vote = btn.getAttribute('data-vote');
        mutate(s=>{ const banc = s.bancadas.find(b=>b.id===me.bancadaId); if(banc){ banc.currentVote=vote; banc.voteBy=session.playerName; } });
      };
    });
    const denSubmit = document.getElementById('den-submit');
    if(denSubmit) denSubmit.onclick = ()=>{
      const bancId = document.getElementById('den-bancada').value;
      const nota = document.getElementById('den-nota').value.trim();
      if(!nota) return;
      mutate(s=>{ s.denuncias.push({ id: uid('den'), veedorId: me.id, veedorName: session.playerName, bancadaId: bancId, note: nota, round: s.round, resolved:false }); });
    };
    const back = document.getElementById('back-entry5');
    if(back) back.onclick = exitToEntry;
  }

  /* ---------------------------- TICK GLOBAL (refresca cronómetro visualmente) ---------------------------- */

  setInterval(()=>{
    if(currentState && currentState.timerEndsAt && (session.role==='gm' || session.role==='beamer' || session.role==='player')){
      renderApp();
    }
  }, 1000);

  /* ---------------------------- ARRANQUE ---------------------------- */

  (async function init(){
    if(!CONFIGURED){ renderApp(); return; }
    const saved = loadSession();
    if(saved && saved.lobbyCode && saved.role){
      session = saved;
      const s = await storageGet(session.lobbyCode);
      if(s){
        currentState = s; subscribeRealtime(session.lobbyCode); startPolling();
        if(session.role==='player') startHeartbeat();
      } else { session = { role:null, lobbyCode:null, playerId:null, playerName:null }; clearSession(); }
    }
    renderApp();
  })();
})();
</script>
</body>
</html>
